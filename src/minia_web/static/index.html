<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinIA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        :root {
            --user-color: #00aaff;
            --llm-color: #44cc44;
            --tool-color: #cc77ff;
            --event-color: #cccc44;
            --error-color: #ff4444;
            --thinking-color: #888888;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            padding: 0;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid var(--pico-muted-border-color);
            background-color: var(--pico-background-color);
        }

        header h1 {
            margin: 0;
            font-size: 1.25rem;
        }

        #token-count {
            font-size: 0.75rem;
            color: var(--pico-muted-color);
            margin-left: 0.5rem;
        }

        .header-controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        /* Chat area */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            line-height: 1.5;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--user-color);
            color: white;
        }

        .message.assistant {
            align-self: flex-start;
            background-color: #e8f5e8;
            color: var(--pico-color);
        }

        .message.tool {
            align-self: center;
            background-color: transparent;
            color: var(--tool-color);
            font-style: italic;
            font-size: 0.875rem;
            max-width: 100%;
        }

        .message.event {
            align-self: center;
            background-color: transparent;
            color: var(--event-color);
            font-size: 0.875rem;
            max-width: 100%;
        }

        .message.error {
            align-self: center;
            background-color: transparent;
            color: var(--error-color);
            max-width: 100%;
        }

        .message.thinking {
            align-self: flex-start;
            background-color: transparent;
            color: var(--thinking-color);
            font-style: italic;
            font-size: 0.875rem;
        }

        .message-label {
            font-weight: bold;
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
            opacity: 0.7;
        }

        /* Input area */
        #input-container {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            border-top: 1px solid var(--pico-muted-border-color);
            background-color: var(--pico-background-color);
        }

        #input-container input[type="text"] {
            flex: 1;
            margin: 0;
        }

        /* Connection status */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.5rem;
        }

        .status-dot.connected {
            background-color: var(--llm-color);
        }

        .status-dot.disconnected {
            background-color: var(--error-color);
        }

        /* Markdown-like styling */
        .message.assistant code {
            background-color: var(--pico-code-background-color);
            padding: 0.125rem 0.25rem;
            border-radius: 0.25rem;
            font-family: monospace;
        }

        .message.assistant pre {
            background-color: var(--pico-code-background-color);
            padding: 0.75rem;
            border-radius: 0.5rem;
            overflow-x: auto;
        }

        .message.assistant pre code {
            background: none;
            padding: 0;
        }

        .message.assistant strong {
            font-weight: bold;
        }

        .message.assistant em {
            font-style: italic;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .message {
                max-width: 95%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1><span id="status-dot" class="status-dot disconnected"></span>MinIA <span id="token-count"></span></h1>
        <div class="header-controls">
            <button id="mute-btn" class="outline" title="Toggle audio">
                🔊 Audio On
            </button>
        </div>
    </header>

    <div id="chat-container">
        <div class="message event">
            <div class="message-label">System</div>
            <div>Connecting to MinIA...</div>
        </div>
    </div>

    <div id="input-container">
        <input type="text" id="message-input" placeholder="Type your message..." autofocus>
        <button id="send-btn">Send</button>
    </div>

    <script>
        // State
        let ws = null;
        let isMuted = false;
        let audioContext = null;
        let audioQueue = [];
        let isPlayingAudio = false;

        // DOM elements
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const muteBtn = document.getElementById('mute-btn');
        const statusDot = document.getElementById('status-dot');

        // Initialize
        connectWebSocket();
        messageInput.focus();

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        muteBtn.addEventListener('click', toggleMute);

        // WebSocket connection
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onopen = () => {
                updateStatus(true);
                addEventMessage('Connected to MinIA');
            };

            ws.onclose = () => {
                updateStatus(false);
                addEventMessage('Disconnected. Reconnecting...');
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };

            ws.onmessage = (event) => {
                if (event.data instanceof Blob) {
                    event.data.arrayBuffer().then(buffer => {
                        handleAudioFrame(new Uint8Array(buffer));
                    });
                } else {
                    try {
                        const msg = JSON.parse(event.data);
                        handleServerMessage(msg);
                    } catch (e) {
                        console.error('Failed to parse message:', e);
                    }
                }
            };
        }

        // Send message
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'input',
                    content: text
                }));
            }

            messageInput.value = '';
            messageInput.focus();
        }

        // Handle server messages
        function handleServerMessage(msg) {
            console.log(msg);
            const type = msg.type;

            switch (type) {
                case 'user_input':
                    addUserMessage(msg.content);
                    break;
                case 'text':
                    appendToAssistantMessage(msg.content);
                    break;
                case 'final':
                    finalizeAssistantMessage(msg.content);
                    break;
                case 'thinking':
                    addOrUpdateThinking(msg.content);
                    break;
                case 'tool_call_start':
                    addToolMessage('Running: ' + (msg.tool_name || msg.content || '') + ' ' + msg.task_instruction);
                    break;
                case 'tool_call':
                    addToolMessage('Result: ' + (msg.content || ''));
                    break;
                case 'error':
                    addErrorMessage(msg.message || msg.content || 'Unknown error');
                    break;
                case 'cleared':
                    clearChat();
                    break;
                case 'compaction':
                    addEventMessage('Context compaction: ' + (msg.content || ''));
                    break;
                case 'ready':
                    addEventMessage('Connected to MinIA server');
                    break;
                case 'usage':
                    updateTokenCount(msg.tokens);
                    break;
                default:
                    // Unknown message type - log for debugging
                    console.log('Unknown message type:', type, msg);
            }
        }

        // Add user message
        function addUserMessage(content) {
            const div = document.createElement('div');
            div.className = 'message user';
            div.textContent = content;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        // Add new assistant message
        function addAssistantMessage() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.innerHTML = '<div class="message-label">Assistant</div><div class="content"></div>';
            chatContainer.appendChild(div);
            return div.querySelector('.content');
        }

        // Append to current assistant message
        function appendToAssistantMessage(content) {
            let contentDiv = null;
            const messages = chatContainer.querySelectorAll('.message.assistant');
            
            if (messages.length > 0) {
                contentDiv = messages[messages.length - 1].querySelector('.content');
            } else {
                contentDiv = addAssistantMessage();
            }

            // Simple markdown-like formatting
            contentDiv.innerHTML += escapeHtml(content);
            scrollToBottom();
        }

        // Finalize assistant message
        function finalizeAssistantMessage(content) {
            const messages = chatContainer.querySelectorAll('.message.assistant');
            if (messages.length > 0) {
                const contentDiv = messages[messages.length - 1].querySelector('.content');
                contentDiv.innerHTML = renderMarkdown(content);
            }

            // Play audio if not muted
            if (!isMuted && content.trim() && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'tts_speak',
                    content: content
                }));
            }
        }

        // Add thinking message
        function addOrUpdateThinking(content) {
            let thinkingDiv = chatContainer.querySelector('.message.thinking');
            
            if (!thinkingDiv) {
                thinkingDiv = document.createElement('div');
                thinkingDiv.className = 'message thinking';
                chatContainer.appendChild(thinkingDiv);
            }

            thinkingDiv.textContent = content;
            scrollToBottom();
        }

        // Add tool message
        function addToolMessage(content) {
            const div = document.createElement('div');
            div.className = 'message tool';
            div.textContent = '[tool] ' + content;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        // Add event message
        function addEventMessage(content) {
            const div = document.createElement('div');
            div.className = 'message event';
            div.innerHTML = '<div class="message-label">System</div><div>' + escapeHtml(content) + '</div>';
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        // Add error message
        function addErrorMessage(content) {
            const div = document.createElement('div');
            div.className = 'message error';
            div.innerHTML = '<div class="message-label">Error</div><div>' + escapeHtml(content) + '</div>';
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        // Clear chat
        function clearChat() {
            chatContainer.innerHTML = '';
            document.getElementById('token-count').textContent = '';
            addEventMessage('Chat cleared');
        }

        // Update token count display
        function updateTokenCount(tokens) {
            const el = document.getElementById('token-count');
            if (tokens) {
                el.textContent = tokens.toLocaleString() + ' tokens';
            } else {
                el.textContent = '';
            }
        }

        // Handle incoming TTS audio frame
        function handleAudioFrame(data) {
            if (isMuted) return;
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            audioQueue.push(data);
            if (!isPlayingAudio) {
                processAudioQueue();
            }
        }

        async function processAudioQueue() {
            isPlayingAudio = true;
            while (audioQueue.length > 0) {
                const frame = audioQueue.shift();
                // Parse frame: [num_samples: 4 bytes][PCM int16 data]
                const numSamples = new DataView(frame.buffer).getUint32(0);
                const pcmData = frame.slice(4);
                // Convert int16 PCM to float32 for Web Audio API
                const float32Data = new Float32Array(numSamples);
                const int16View = new Int16Array(pcmData.buffer);
                for (let i = 0; i < numSamples; i++) {
                    float32Data[i] = int16View[i] / 32768.0;
                }
                // Create audio buffer and play
                const buffer = audioContext.createBuffer(1, numSamples, 48000);
                buffer.getChannelData(0).set(float32Data);
                const source = audioContext.createBufferSource();
                source.buffer = buffer;
                source.connect(audioContext.destination);
                source.start();
                // Wait for this chunk to finish before playing next
                await new Promise(resolve => {
                    source.onended = resolve;
                });
            }
            isPlayingAudio = false;
        }

        // Toggle mute
        function toggleMute() {
            isMuted = !isMuted;
            
            if (isMuted) {
                muteBtn.textContent = '🔇 Audio Off';
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'tts_stop' }));
                }
                audioQueue = [];
                isPlayingAudio = false;
            } else {
                muteBtn.textContent = '🔊 Audio On';
            }
        }

        // Update connection status
        function updateStatus(connected) {
            if (connected) {
                statusDot.classList.remove('disconnected');
                statusDot.classList.add('connected');
            } else {
                statusDot.classList.remove('connected');
                statusDot.classList.add('disconnected');
            }
        }

        // Scroll to bottom
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Simple markdown renderer
        function renderMarkdown(text) {
            // Escape HTML first
            let html = escapeHtml(text);
            
            // Code blocks
            html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Bold
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            
            // Italic
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            
            // Line breaks
            html = html.replace(/\n/g, '<br>');
            
            return html;
        }
    </script>
</body>
</html>
